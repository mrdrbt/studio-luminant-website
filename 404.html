<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Sayfa Bulunamadı | Studio Luminant</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .error-container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 40px;
  }
  .error-code {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(80px, 15vw, 160px);
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    margin: 0 0 8px;
    opacity: 0.4;
  }
  .error-title {
    font-family: 'Jost', sans-serif;
    font-size: clamp(13px, 2vw, 15px);
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin: 0 0 48px;
  }
  .error-message {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 300;
    font-style: italic;
    color: var(--text-primary);
    margin: 0 0 16px;
    max-width: 480px;
  }
  .error-sub {
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text-secondary);
    margin: 0 0 56px;
    max-width: 380px;
    line-height: 1.7;
  }
  .error-links {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .error-links a {
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--obsidian);
    background: var(--gold);
    padding: 12px 28px;
    text-decoration: none;
    transition: background 0.2s;
  }
  .error-links a:hover { background: var(--gold-light); }
  .error-links a.secondary {
    background: transparent;
    color: var(--gold-dim);
    border: 1px solid var(--gold-dim);
  }
  .error-links a.secondary:hover { color: var(--gold); border-color: var(--gold); }
  .error-divider {
    width: 1px;
    height: 40px;
    background: var(--gold);
    opacity: 0.3;
    margin: 64px auto 0;
  }
  .error-en {
    margin-top: 24px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .error-en a { color: var(--gold-dim); text-decoration: none; }
  .error-en a:hover { color: var(--gold); }
</style>
<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PZ0SGLKLH0"></script>

  gtag('js', new Date());
  gtag('config', 'G-PZ0SGLKLH0');
</script>
</head>
<body>
<div id="site-nav" data-lang="tr" data-base="./"></div>

<main class="error-container">
  <div class="error-code">404</div>
  <div class="error-title">Sayfa Bulunamadı</div>
  <p class="error-message">Aradığınız sayfa mevcut değil.</p>
  <p class="error-sub">Sayfa taşınmış, silinmiş ya da hiç var olmamış olabilir. Ana sayfaya dönerek devam edebilirsiniz.</p>
  <div class="error-links">
    <a href="/">Ana Sayfa</a>
    <a href="/urunler.htm" class="secondary">Ürünler</a>
    <a href="/iletisim.htm" class="secondary">İletişim</a>
  </div>
  <div class="error-divider"></div>
  <div class="error-en">Page not found — <a href="/en/">Go to English site</a></div>
</main>

<div id="site-footer" data-lang="tr" data-base="./"></div>
<script src="shared.js"></script>
<script src="components.js"></script>
</body>
</html>
