[build]
  publish = "."

# Redirect www to non-www (canonical)
[[redirects]]
  from = "https://www.studioluminant.com/*"
  to = "https://studioluminant.com/:splat"
  status = 301
  force = true

# Security and caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Long cache for images (1 year, immutable content-hashed filenames)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache CSS/JS for 1 week (content changes with deploys)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ─── Homepage rewrites (serve actual content at clean URLs) ───
# Fixes /en/ soft-404 in Google Search Console
# force = true overrides the existing index.html meta-refresh files
[[redirects]]
  from = "/"
  to = "/Studio Luminant — Özel Mimari Elemanlar.htm"
  status = 200
  force = true

[[redirects]]
  from = "/en"
  to = "/en/Studio Luminant — Bespoke Architectural Elements.htm"
  status = 200
  force = true

[[redirects]]
  from = "/en/"
  to = "/en/Studio Luminant — Bespoke Architectural Elements.htm"
  status = 200
  force = true

# ─── WordPress ghost URLs — 410 Gone ───
# Domain was previously WordPress; tell Google to drop these
[[redirects]]
  from = "/feed/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/wp-json/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/wp-content/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/wp-admin/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/wp-login.php"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/xmlrpc.php"
  to = "/404.html"
  status = 410

